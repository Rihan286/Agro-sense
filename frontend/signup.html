<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgroSense — Sign Up</title>
    <meta name="description"
        content="Create your free AgroSense farmer account to access AI-powered crop disease detection, weather, and market intelligence.">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/global.css">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: var(--background);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .auth-container {
            background: var(--surface);
            padding: 40px;
            border-radius: 16px;
            border: 1px solid var(--divider);
            box-shadow: var(--shadow-card);
            width: 100%;
            max-width: 480px;
        }

        .auth-container h2 {
            text-align: center;
            color: var(--text-primary);
            margin-bottom: 24px;
            font-size: 24px;
            font-weight: 700;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            color: var(--text-secondary);
            font-size: 14px;
            font-weight: 500;
        }

        .form-group input {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid var(--divider);
            border-radius: var(--radius-sm);
            box-sizing: border-box;
            font-size: 15px;
            transition: all 0.3s;
            color: var(--text-primary);
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(93, 187, 99, 0.2);
        }

        .form-row {
            display: flex;
            gap: 12px;
        }

        .form-row .form-group {
            flex: 1;
        }

        .btn-submit {
            width: 100%;
            padding: 14px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            transition: var(--transition);
            margin-top: 12px;
        }

        .btn-submit:hover {
            background: var(--accent);
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(93, 187, 99, 0.3);
        }

        .auth-links {
            text-align: center;
            margin-top: 18px;
            font-size: 14px;
            color: var(--text-secondary);
        }

        .auth-links a {
            color: var(--primary);
            font-weight: 600;
        }

        .msg {
            text-align: center;
            margin-bottom: 15px;
            display: none;
            font-size: 14px;
            padding: 10px;
            border-radius: var(--radius-sm);
        }

        .msg.error {
            color: #d32f2f;
            background: rgba(211, 47, 47, 0.08);
        }

        .msg.success {
            color: var(--primary);
            background: rgba(31, 122, 99, 0.08);
        }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 12px;
            font-size: 13px;
        }

        .back-link a {
            color: var(--text-secondary);
        }
    </style>
</head>

<body>
    <main class="auth-container" role="main">
        <h2>🌿 Create Farmer Account</h2>
        <div id="status-msg" class="msg" role="alert" aria-live="polite"></div>
        <form id="signup-form" novalidate>
            <div class="form-group">
                <label for="name">Full Name</label>
                <input type="text" id="name" required placeholder="Your full name" aria-label="Full name"
                    autocomplete="name">
            </div>
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" required placeholder="you@example.com" aria-label="Email address"
                    autocomplete="email">
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label for="phone">Phone Number</label>
                    <input type="tel" id="phone" required placeholder="+91 XXXXXXXXXX" aria-label="Phone number"
                        autocomplete="tel">
                </div>
                <div class="form-group">
                    <label for="location">Location</label>
                    <input type="text" id="location" required placeholder="City, State" aria-label="Location"
                        autocomplete="address-level2">
                </div>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" minlength="6" required placeholder="Minimum 6 characters"
                    aria-label="Password" autocomplete="new-password">
            </div>
            <button type="submit" class="btn-submit" aria-label="Create your account" id="signup-submit-btn">Sign
                Up</button>
        </form>
        <div class="auth-links">
            <p>Already have an account? <a href="login.html">Login</a></p>
        </div>
        <div class="back-link">
            <a href="index.html">← Back to Home</a>
        </div>
    </main>

    <script>
        document.getElementById('signup-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const submitBtn = document.getElementById('signup-submit-btn');

            const data = {
                name: document.getElementById('name').value,
                email: document.getElementById('email').value,
                phone: document.getElementById('phone').value,
                location: document.getElementById('location').value,
                password: document.getElementById('password').value
            };

            const statusMsg = document.getElementById('status-msg');
            statusMsg.style.display = 'none';
            statusMsg.className = 'msg';
            submitBtn.disabled = true;
            submitBtn.textContent = 'Creating account...';

            try {
                const response = await fetch('http://localhost:5000/api/auth/signup', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                const result = await response.json();

                if (result.success) {
                    statusMsg.textContent = 'Account created successfully! Redirecting...';
                    statusMsg.className = 'msg success';
                    statusMsg.style.display = 'block';
                    setTimeout(() => window.location.href = 'login.html', 2000);
                } else {
                    statusMsg.textContent = result.error || 'Signup failed';
                    statusMsg.className = 'msg error';
                    statusMsg.style.display = 'block';
                }
            } catch (err) {
                statusMsg.textContent = 'Server connection error. Please try again.';
                statusMsg.className = 'msg error';
                statusMsg.style.display = 'block';
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = 'Sign Up';
            }
        });
    </script>
</body>

</html>
