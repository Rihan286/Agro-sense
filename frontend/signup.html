<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgroSense - Sign Up</title>
    <!-- CSS and fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; background-color: #ADFFC7; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; padding: 20px;}
        .auth-container { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 450px; }
        .auth-container h2 { text-align: center; color: #1B4716; margin-bottom: 20px; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; color: #555; font-size: 14px;}
        .form-group input { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; }
        .form-row { display: flex; gap: 10px; }
        .form-row .form-group { flex: 1; }
        .btn-submit { width: 100%; padding: 12px; background: #4caf50; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 16px; font-weight: 600; transition: background 0.3s; margin-top: 10px;}
        .btn-submit:hover { background: #388e3c; }
        .auth-links { text-align: center; margin-top: 15px; font-size: 14px; }
        .auth-links a { color: #1B4716; text-decoration: none; }
        .msg { text-align: center; margin-bottom: 15px; display: none; font-size: 14px;}
        .msg.error { color: #d32f2f; }
        .msg.success { color: #388e3c; }
    </style>
</head>
<body>
    <div class="auth-container">
        <h2>Create Farmer Account</h2>
        <div id="status-msg" class="msg"></div>
        <form id="signup-form">
            <div class="form-group">
                <label for="name">Full Name</label>
                <input type="text" id="name" required>
            </div>
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" required>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label for="phone">Phone Number</label>
                    <input type="tel" id="phone" required>
                </div>
                <div class="form-group">
                    <label for="location">Location</label>
                    <input type="text" id="location" required>
                </div>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" minlength="6" required>
            </div>
            <button type="submit" class="btn-submit">Sign Up</button>
        </form>
        <div class="auth-links">
            <p>Already have an account? <a href="login.html">Login</a></p>
        </div>
    </div>

    <script>
        document.getElementById('signup-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const data = {
                name: document.getElementById('name').value,
                email: document.getElementById('email').value,
                phone: document.getElementById('phone').value,
                location: document.getElementById('location').value,
                password: document.getElementById('password').value
            };
            
            const statusMsg = document.getElementById('status-msg');
            statusMsg.style.display = 'none';
            statusMsg.className = 'msg';

            try {
                const response = await fetch('http://localhost:5000/api/auth/signup', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                const result = await response.json();

                if (result.success) {
                    statusMsg.textContent = 'Account created successfully! Redirecting...';
                    statusMsg.className = 'msg success';
                    statusMsg.style.display = 'block';
                    setTimeout(() => window.location.href = 'login.html', 2000);
                } else {
                    statusMsg.textContent = result.error || 'Signup failed';
                    statusMsg.className = 'msg error';
                    statusMsg.style.display = 'block';
                }
            } catch (err) {
                statusMsg.textContent = 'Server connection error';
                statusMsg.className = 'msg error';
                statusMsg.style.display = 'block';
            }
        });
    </script>
</body>
</html>
