<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgroSense — Login</title>
    <meta name="description" content="Log in to your AgroSense farmer account to access AI disease detection, weather forecasts, market prices and more.">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/global.css">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(rgba(30, 42, 40, 0.45), rgba(46, 139, 87, 0.5)),
                        url('https://images.unsplash.com/photo-1592982537447-6f2cf32f9157?q=80&w=2000&auto=format&fit=crop') center/cover no-repeat;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
        }

        .auth-container {
            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            padding: 44px;
            border-radius: 20px;
            box-shadow: 0 16px 40px rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.25);
            width: 100%;
            max-width: 420px;
            color: white;
        }

        .auth-container h2 {
            text-align: center;
            color: white;
            margin-bottom: 24px;
            font-weight: 700;
            font-size: 24px;
        }

        .form-group { margin-bottom: 18px; }

        .form-group label {
            display: block;
            margin-bottom: 6px;
            color: rgba(255, 255, 255, 0.9);
            font-weight: 500;
            font-size: 14px;
        }

        .form-group input {
            width: 100%;
            padding: 13px 14px;
            background: rgba(255, 255, 255, 0.92);
            border: 1px solid rgba(255, 255, 255, 0.4);
            border-radius: var(--radius-sm);
            box-sizing: border-box;
            font-size: 15px;
            color: var(--text-primary);
            transition: all 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(93, 187, 99, 0.35);
        }

        .btn-submit {
            width: 100%;
            padding: 14px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            transition: var(--transition);
            margin-top: 12px;
        }

        .btn-submit:hover {
            background: var(--accent);
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(93, 187, 99, 0.35);
        }

        .auth-links {
            text-align: center;
            margin-top: 20px;
            font-size: 14px;
            color: rgba(255, 255, 255, 0.8);
        }

        .auth-links a {
            color: white;
            text-decoration: underline;
            font-weight: 600;
        }

        .auth-links a:hover {
            color: var(--accent);
        }

        #error-msg {
            color: #ff5252;
            text-align: center;
            margin-bottom: 15px;
            display: none;
            background: rgba(255, 82, 82, 0.12);
            padding: 10px;
            border-radius: var(--radius-sm);
            border: 1px solid rgba(255, 82, 82, 0.25);
            font-size: 14px;
        }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 16px;
            color: rgba(255, 255, 255, 0.7);
            font-size: 13px;
        }

        .back-link a {
            color: rgba(255, 255, 255, 0.9);
        }
    </style>
</head>
<body>
    <main class="auth-container" role="main">
        <h2>🌿 AgroSense Login</h2>
        <div id="error-msg" role="alert" aria-live="polite"></div>
        <form id="login-form" novalidate>
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" required placeholder="you@example.com" aria-label="Email address" autocomplete="email">
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" required placeholder="Enter your password" aria-label="Password" autocomplete="current-password">
            </div>
            <button type="submit" class="btn-submit" aria-label="Login to your account" id="login-submit-btn">Login</button>
        </form>
        <div class="auth-links">
            <p>Don't have an account? <a href="signup.html">Sign Up</a></p>
        </div>
        <div class="back-link">
            <a href="index.html">← Back to Home</a>
        </div>
    </main>

    <script>
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('error-msg');
            const submitBtn = document.getElementById('login-submit-btn');

            errorMsg.style.display = 'none';
            submitBtn.disabled = true;
            submitBtn.textContent = 'Logging in...';

            try {
                const response = await fetch('http://localhost:5000/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();

                if (data.success) {
                    localStorage.setItem('agrosense_token', data.token);
                    localStorage.setItem('agrosense_user', JSON.stringify(data.user));
                    window.location.href = 'dashboard.html';
                } else {
                    errorMsg.textContent = data.error || 'Login failed';
                    errorMsg.style.display = 'block';
                }
            } catch (err) {
                errorMsg.textContent = 'Server connection error. Please try again.';
                errorMsg.style.display = 'block';
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = 'Login';
            }
        });

        // Allow Enter key on password to submit
        document.getElementById('password').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                document.getElementById('login-form').requestSubmit();
            }
        });
    </script>
</body>
</html>
